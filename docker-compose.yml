version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: borsa
      POSTGRES_PASSWORD: borsa123
      POSTGRES_DB: borsa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U borsa"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://borsa:borsa123@postgres:5432/borsa
      SYNC_DATABASE_URL: postgresql://borsa:borsa123@postgres:5432/borsa
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://borsa:borsa123@postgres:5432/borsa
      SYNC_DATABASE_URL: postgresql://borsa:borsa123@postgres:5432/borsa
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
